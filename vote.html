<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riff Off Voting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "DM Sans", sans-serif;
            color: #211f54;
            background:
                radial-gradient(circle at top left, rgba(203, 181, 242, 0.45), transparent 34%),
                radial-gradient(circle at bottom right, rgba(195, 146, 231, 0.26), transparent 30%),
                linear-gradient(180deg, #f7f2ee 0%, #fbfaf8 100%);
        }

        .card {
            width: min(100%, 520px);
            padding: 34px 28px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 28px 80px rgba(66, 39, 110, 0.14);
            text-align: center;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            margin-bottom: 18px;
            padding: 8px 18px;
            border: 1px solid rgba(111, 54, 179, 0.28);
            border-radius: 999px;
            background: rgba(242, 235, 251, 0.9);
            color: #6f36b3;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: "Fraunces", serif;
            font-size: clamp(38px, 10vw, 56px);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        p {
            margin: 16px 0 0;
            font-size: 18px;
            line-height: 1.55;
            color: #4f4a79;
        }

        .links {
            display: grid;
            gap: 12px;
            margin-top: 28px;
        }

        a {
            display: block;
            padding: 14px 16px;
            border-radius: 14px;
            background: linear-gradient(90deg, #6f36b3 0%, #7d3ac7 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="eyebrow">Riff Off Voting</div>
        <h1>Use the QR code on the projector screen.</h1>
        <p>Voting now happens through Google Forms, so this page is just a backup reference.</p>
        <div class="links">
            <a href="https://z.umn.edu/riff1">z.umn.edu/riff1</a>
            <a href="https://z.umn.edu/riff2">z.umn.edu/riff2</a>
            <a href="https://z.umn.edu/riff3">z.umn.edu/riff3</a>
        </div>
    </main>
</body>
</html>
