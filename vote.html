<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote — Riff Off</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #7b2d8e 0%, #9b3fb5 30%, #a855a0 60%, #7b2d8e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }
        * { z-index: 1; position: relative; }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 6px;
            color: #b892ff;
            text-shadow: 0 0 30px rgba(184,146,255,0.3);
        }
        .team-name select {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 3px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid #b892ff;
            border-radius: 8px;
            padding: 8px;
            font-family: 'Inter', sans-serif;
            width: 100%;
            max-width: 400px;
        }
        .round-label select {
            font-size: 16px;
            color: #fff;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(184,146,255,0.6);
            border-radius: 6px;
            padding: 4px 8px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-family: 'Inter', sans-serif;
        }
        .vote-form {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .vote-category {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(184,146,255,0.2);
            border-radius: 14px;
            padding: 20px;
        }
        .vote-category label {
            display: block;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }
        .vote-category label span {
            color: #b892ff;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .slider-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 4px;
            background: rgba(184,146,255,0.2);
            outline: none;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #b892ff;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(184,146,255,0.5);
        }
        .slider-val {
            font-weight: 800;
            font-size: 24px;
            color: #b892ff;
            min-width: 30px;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 4px;
            color: #fff;
            background: linear-gradient(135deg, #9b3fb5, #b892ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(184,146,255,0.3);
            transition: all 0.2s;
        }
        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .submit-btn:active { transform: translateY(2px); }
        .success-msg {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success-msg.show { display: block; }
        .success-msg h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 4px;
            color: #f5e6d3;
            margin-bottom: 10px;
        }
        .success-msg p, .closed-msg p { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 20px;}
        .closed-msg {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .closed-msg.show { display: block; }
    </style>
</head>
<body>
    <h1>VOTE</h1>
    <div class="team-name" id="teamContainer">
        <select id="teamNameSelect">
            <option value="VOCAL U">VOCAL U</option>
            <option value="7 DAYS">7 DAYS</option>
            <option value="BASSES WILD">BASSES WILD</option>
            <option value="THE ENCHANTMENTS">THE ENCHANTMENTS</option>
            <option value="URBAN SOUND">URBAN SOUND</option>
        </select>
    </div>
    <div class="round-label" id="roundContainer">
        <select id="roundSelect">
            <option value="1">ROUND 1</option>
            <option value="2">ROUND 2</option>
            <option value="3">ROUND 3</option>
        </select>
    </div>

    <div class="closed-msg" id="closedMsg">
        <h2>VOTING CLOSED</h2>
        <p>There is no team currently performing. Please wait for the next group.</p>
    </div>

    <form class="vote-form" id="voteForm">
        <div class="vote-category">
            <label>🎵 Enjoyability <span>(1–10)</span></label>
            <div class="slider-row">
                <input type="range" min="0" max="10" value="0" id="enjoyability" oninput="document.getElementById('ej-val').textContent=this.value">
                <div class="slider-val" id="ej-val">0</div>
            </div>
        </div>

        <div class="vote-category">
            <label>🎤 Vocal Quality <span>(1–10)</span></label>
            <div class="slider-row">
                <input type="range" min="0" max="10" value="0" id="vocalQuality" oninput="document.getElementById('vq-val').textContent=this.value">
                <div class="slider-val" id="vq-val">0</div>
            </div>
        </div>

        <div class="vote-category">
            <label>🎭 Performance Quality <span>(1–10)</span></label>
            <div class="slider-row">
                <input type="range" min="0" max="10" value="0" id="performanceQuality" oninput="document.getElementById('pq-val').textContent=this.value">
                <div class="slider-val" id="pq-val">0</div>
            </div>
        </div>

        <button type="submit" class="submit-btn">SUBMIT VOTE</button>
    </form>

    <div class="success-msg" id="successMsg">
        <h2>VOTE SUBMITTED!</h2>
        <p>Thank you for voting. Your scores have been recorded.</p>
    </div>

    <script>
        const SUPABASE_URL = "";
        const SUPABASE_ANON_KEY = "";
        
        // Parse URL params just in case they are eventually passed, else set defaults
        const params = new URLSearchParams(window.location.search);
        let defaultTeam = params.get('team') || 'VOCAL U';
        let defaultRound = params.get('round') || '1';

        document.getElementById('teamNameSelect').value = defaultTeam;
        document.getElementById('roundSelect').value = defaultRound;

        if (SUPABASE_URL && SUPABASE_ANON_KEY && typeof window.supabase !== 'undefined') {
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Initial fetch
            supabase.from('live_state').select('*').eq('id', 1).single().then(({data}) => {
                if (data) handleLiveState(data);
            });

            // Subscribe to real-time updates
            supabase.channel('live-updates')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_state' }, payload => {
                    handleLiveState(payload.new);
                })
                .subscribe();
        }

        function handleLiveState(state) {
            document.getElementById('successMsg').classList.remove('show');
            if (state.is_open) {
                document.getElementById('closedMsg').classList.remove('show');
                document.getElementById('voteForm').style.display = 'flex';
                document.getElementById('teamContainer').style.display = 'block';
                document.getElementById('roundContainer').style.display = 'block';
                document.getElementById('teamNameSelect').value = state.team;
                document.getElementById('roundSelect').value = state.round;
                // Optionally disable the selects to enforce the live state:
                // document.getElementById('teamNameSelect').disabled = true;
                // document.getElementById('roundSelect').disabled = true;
            } else {
                document.getElementById('voteForm').style.display = 'none';
                document.getElementById('teamContainer').style.display = 'none';
                document.getElementById('roundContainer').style.display = 'none';
                document.getElementById('closedMsg').classList.add('show');
            }
        }

        document.getElementById('voteForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const vote = {
                team: document.getElementById('teamNameSelect').value,
                round: parseInt(document.getElementById('roundSelect').value),
                enjoyability: parseInt(document.getElementById('enjoyability').value),
                vocalQuality: parseInt(document.getElementById('vocalQuality').value),
                performanceQuality: parseInt(document.getElementById('performanceQuality').value),
                timestamp: Date.now()
            };
            
            // Store in localStorage
            let votes = JSON.parse(localStorage.getItem('riffoff-votes') || '[]');
            votes.push(vote);
            localStorage.setItem('riffoff-votes', JSON.stringify(votes));
            
            // Show success
            document.getElementById('voteForm').style.display = 'none';
            document.getElementById('successMsg').classList.add('show');
        });
    </script>
</body>
</html>
